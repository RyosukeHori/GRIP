defaults:
  - _self_
  - env: env_im_pnn_grip
  - robot: smpl_humanoid
  - learning: im_pnn_big
  - sim: default_sim

project_name: "GRIP_Refiner"
notes: "Default Notes"
exp_name: &exp_name humanoid_smpl
headless: True
seed: 0
no_log: False
resume_str: null
num_threads: 64
test: False 
output_path: output/dynamics_net
torch_deterministic: False
epoch: 0
im_eval: False
horovod: False # Use horovod for multi-gpu training, have effect only with rl_games RL library
rl_device: "cuda:0"   ###################
device: "cuda"  ###################
device_id: 0   ###################
metadata: false
play: ${test}
train: True


####### Testing Configs. ########
server_mode: False
has_eval: False
no_virtual_display: False
render_o3d: False
debug: False
follow: True
add_proj: False
real_traj: False

hydra:
  job:
    name: ${exp_name}
    env_set:
      OMP_NUM_THREADS: 1
  run:
    dir: output/dynamics_net

